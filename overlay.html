<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="overlay.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="stats">
  <button id="stats-close" title="Close">&#10005;</button>
  <div class="resize-handle rh-right"  data-dir="r"></div>
  <div class="resize-handle rh-bottom" data-dir="b"></div>
  <div class="resize-handle rh-corner" data-dir="br"></div>
  <div id="stats-main-row">
    <img id="stats-logo" src="assets/openwhip.png" alt="OpenWhip">
    <div id="stats-divider"></div>
    <div id="stats-content">
      <div class="stat-row">
        <span class="stat-label">Session</span>
        <span class="stat-colon">:</span>
        <span class="stat-value flip-counter" id="stat-session"></span>
      </div>
      <div class="stat-row">
        <span class="stat-label">All Time</span>
        <span class="stat-colon">:</span>
        <span class="stat-value flip-counter" id="stat-total"></span>
      </div>
    </div>
  </div>
  <button id="grab-btn">Grab Whip</button>
  <div id="vol-row">
    <span id="vol-label">Vol</span>
    <input type="range" id="vol-slider" min="0" max="100" value="100">
  </div>
</div>
<script>

// ══════════════════════════════════════════════════════════════════════════════
//  PHYSICS SETTINGS — TWEAK EVERYTHING HERE
// ══════════════════════════════════════════════════════════════════════════════
const P = {
  // Rope structure
  segments:       28,     // number of chain links
  segmentLength:  25,     // base length of each link (px)
  taper:          0.6,   // tip segment is this fraction of base length

  // Physics
  gravity:        1.2,   // normal gravity
  dropGravity:    0.95,    // gravity when dropping/despawning
  damping:        0.96,  // velocity retention per frame (1 = no loss)
  constraintIters:20,     // higher = stiffer chain
  maxStretchRatio: 1.2,  // hard cap for per-link stretch during fast whips

  // Dynamic handle aim (target angle + restoring spring, not static lock)
  baseTargetAngle: -1.12, // radians, default "up-right" resting direction
  handleAimByMouseX: 0.4, // horizontal mouse movement influence on target angle
  handleAimByMouseY: 0.2, // vertical mouse movement influence on target angle
  handleAimClamp:    2.0,  // max radians target can deviate from base angle
  handleSpring:      0.7,  // restoring force to target angle
  handleAngularDamping: 0.078, // angular velocity damping
  basePoseSegments: 2,    // how many early segments are strongly guided
  basePoseStiffStart: 0.9, // stiffness near handle
  basePoseStiffEnd:   0.8, // stiffness near end of guided region

  // Elastic bend limits by chain position (handle stiff, tip floppy)
  handleMaxBendDeg: 16,   // max angle between links near handle
  tipMaxBendDeg:   130,   // max angle between links near tip
  bendRigidityStart: 0.8, // correction strength near handle
  bendRigidityEnd:   0.12, // correction strength near tip

  // Screen-edge slap
  wallBounce:      0.42,   // velocity retained after wall hit
  wallFriction:    0.86,   // tangential damping on wall hit

  // Crack detection
  crackSpeed:     300,     // tip velocity threshold to trigger crack
  crackCooldownMs:1000,  // min ms between cracks
  firstCrackGraceMs: 1200, // no crack (macro) until this long after spawn

  // Visuals
  lineWidthHandle: 7,      // rope thickness near handle
  lineWidthTip:    5,      // rope thickness near tip
  outlineWidth:   3,      // white halo on each Speed it upside of the stroke (approx px)
  handleExtraWidth: 5,    // added core + outline thickness on first handleThickSegments links only
  handleThickSegments: 2, // how many links from the handle get handleExtraWidth
  bgAlpha:        0.011,  // barely-visible bg so window captures mouse events

  // Initial arc shape
  arcWidth:       260,    // how far right the arc extends from mouse
  arcHeight:      185,    // how high the arc goes above mouse
};

// ══════════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let whip = null;
let dropping = false;
let lastCrackTime = 0;
let whipSpawnTime = 0;
let handleAngle = P.baseTargetAngle;
let handleAngVel = 0;

const WHIP_CRACK_SOUNDS = ['sounds/A.mp3', 'sounds/B.mp3', 'sounds/C.mp3', 'sounds/D.mp3', 'sounds/E.mp3'];
let currentVolume = 1.0;
let isMuted = false;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (!whip || dropping) updateMouseIgnore();
});
document.addEventListener('mouseleave', () => {
  if (!whip || dropping) window.bridge.setIgnoreMouseEvents(true, { forward: true });
});

// ── Whip creation ───────────────────────────────────────────────────────────
function spawnWhip(mx, my) {
  dropping = false;
  lastCrackTime = 0;
  whipSpawnTime = Date.now();
  const pts = [];
  for (let i = 0; i < P.segments; i++) {
    const t = i / (P.segments - 1);
    // Nice upward arc from handle (mouse) to tip
    const x = mx + t * P.arcWidth;
    const y = my - Math.sin(t * Math.PI * 0.75) * P.arcHeight;
    pts.push({ x, y, px: x, py: y });
  }
  return pts;
}

function segLen(i) {
  const t = i / (P.segments - 1);
  return P.segmentLength * (1 - t * (1 - P.taper));
}

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;

/** Point on Catmull–Rom spline (extrapolated ends) for index i in `pts`. */
function catmullPoint(pts, i) {
  const n = pts.length;
  if (n === 0) return { x: 0, y: 0 };
  if (i < 0) {
    if (n >= 2) {
      return { x: 2 * pts[0].x - pts[1].x, y: 2 * pts[0].y - pts[1].y };
    }
    return { x: pts[0].x, y: pts[0].y };
  }
  if (i >= n) {
    if (n >= 2) {
      const a = pts[n - 2], b = pts[n - 1];
      return { x: 2 * b.x - a.x, y: 2 * b.y - a.y };
    }
    return { x: pts[n - 1].x, y: pts[n - 1].y };
  }
  return pts[i];
}

/**
 * Cubic Bézier from p1→p2 matching uniform Catmull–Rom through p0,p1,p2,p3.
 * Control points: C1 = p1 + (p2-p0)/6, C2 = p2 - (p3-p1)/6.
 */
function whipSegmentBezier(pts, i) {
  const p0 = catmullPoint(pts, i - 1);
  const p1 = pts[i];
  const p2 = pts[i + 1];
  const p3 = catmullPoint(pts, i + 2);
  return {
    cp1x: p1.x + (p2.x - p0.x) / 6,
    cp1y: p1.y + (p2.y - p0.y) / 6,
    cp2x: p2.x - (p3.x - p1.x) / 6,
    cp2y: p2.y - (p3.y - p1.y) / 6,
    x2: p2.x,
    y2: p2.y,
  };
}
const wrapPi = a => {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
};

let _volume = 1.0;
let _muted = false;

function playCrackSound() {
  if (!WHIP_CRACK_SOUNDS.length || _muted) return;
  const src = WHIP_CRACK_SOUNDS[Math.floor(Math.random() * WHIP_CRACK_SOUNDS.length)];
  const a = new Audio(src);
  a.volume = _volume;
  a.play().catch(() => {});
}

function updateHandleAim() {
  if (dropping) return;
  const mvx = mouseX - prevMouseX;
  const mvy = mouseY - prevMouseY;
  const delta = clamp(
    mvx * P.handleAimByMouseX + mvy * P.handleAimByMouseY,
    -P.handleAimClamp,
    P.handleAimClamp
  );
  const target = P.baseTargetAngle + delta;
  const err = wrapPi(target - handleAngle);
  handleAngVel += err * P.handleSpring;
  handleAngVel *= P.handleAngularDamping;
  handleAngle = wrapPi(handleAngle + handleAngVel);
}

function applyBasePose() {
  if (!whip || dropping) return;
  const dx = Math.cos(handleAngle);
  const dy = Math.sin(handleAngle);
  const guided = Math.min(P.basePoseSegments, whip.length - 1);
  for (let i = 1; i <= guided; i++) {
    const t = (i - 1) / Math.max(guided - 1, 1);
    const stiff = lerp(P.basePoseStiffStart, P.basePoseStiffEnd, t);
    const prev = whip[i - 1];
    const p = whip[i];
    const targetLen = segLen(i - 1);
    const tx = prev.x + dx * targetLen;
    const ty = prev.y + dy * targetLen;
    p.x = lerp(p.x, tx, stiff);
    p.y = lerp(p.y, ty, stiff);
  }
}

function applyBendLimits() {
  if (!whip || whip.length < 3) return;
  for (let i = 1; i < whip.length - 1; i++) {
    const a = whip[i - 1];
    const b = whip[i];
    const c = whip[i + 1];

    const v1x = a.x - b.x;
    const v1y = a.y - b.y;
    const v2x = c.x - b.x;
    const v2y = c.y - b.y;
    const l1 = Math.hypot(v1x, v1y) || 0.0001;
    const l2 = Math.hypot(v2x, v2y) || 0.0001;
    const n1x = v1x / l1, n1y = v1y / l1;
    const n2x = v2x / l2, n2y = v2y / l2;

    const dot = clamp(n1x * n2x + n1y * n2y, -1, 1);
    const angle = Math.acos(dot);
    const t = i / (whip.length - 2);
    const maxBend = lerp(P.handleMaxBendDeg, P.tipMaxBendDeg, t) * Math.PI / 180;
    const bend = Math.PI - angle; // bend away from a straight line
    if (bend <= maxBend) continue;

    // Clamp to max bend while preserving side/sign of the bend.
    const cross = n1x * n2y - n1y * n2x;
    const sign = cross >= 0 ? 1 : -1;
    const targetAngle = Math.PI - maxBend;
    const targetA = Math.atan2(n1y, n1x) + sign * targetAngle;
    const tx = b.x + Math.cos(targetA) * l2;
    const ty = b.y + Math.sin(targetA) * l2;
    const rigidity = lerp(P.bendRigidityStart, P.bendRigidityEnd, t);

    c.x = lerp(c.x, tx, rigidity);
    c.y = lerp(c.y, ty, rigidity);
  }
}

function capSegmentStretch() {
  if (!whip || whip.length < 2) return;
  for (let i = 0; i < whip.length - 1; i++) {
    const a = whip[i];
    const b = whip[i + 1];
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.hypot(dx, dy) || 0.0001;
    const maxLen = segLen(i) * P.maxStretchRatio;
    if (dist <= maxLen) continue;
    const k = maxLen / dist;
    b.x = a.x + dx * k;
    b.y = a.y + dy * k;
  }
}

function applyWallCollisions() {
  if (!whip || dropping) return; // disable collisions while dropping
  const start = 1; // keep pinned handle untouched
  for (let i = start; i < whip.length; i++) {
    const p = whip[i];
    let vx = p.x - p.px;
    let vy = p.y - p.py;
    let hit = false;

    if (p.x < 0) {
      p.x = 0;
      if (vx < 0) vx = -vx * P.wallBounce;
      vy *= P.wallFriction;
      hit = true;
    } else if (p.x > W) {
      p.x = W;
      if (vx > 0) vx = -vx * P.wallBounce;
      vy *= P.wallFriction;
      hit = true;
    }

    if (p.y < 0) {
      p.y = 0;
      if (vy < 0) vy = -vy * P.wallBounce;
      vx *= P.wallFriction;
      hit = true;
    } else if (p.y > H) {
      p.y = H;
      if (vy > 0) vy = -vy * P.wallBounce;
      vx *= P.wallFriction;
      hit = true;
    }

    if (hit) {
      p.px = p.x - vx;
      p.py = p.y - vy;
    }
  }
}

// ── Physics step ────────────────────────────────────────────────────────────
function update() {
  if (!whip) return;

  const g = dropping ? P.dropGravity : P.gravity;
  updateHandleAim();

  // Verlet integration
  const start = dropping ? 0 : 1; // if dropping, handle is free too
  for (let i = start; i < whip.length; i++) {
    const p = whip[i];
    const vx = (p.x - p.px) * P.damping;
    const vy = (p.y - p.py) * P.damping;
    p.px = p.x;
    p.py = p.y;
    p.x += vx;
    p.y += vy + g;
  }

  // Pin handle to mouse
  if (!dropping) {
    whip[0].x = mouseX;
    whip[0].y = mouseY;
    whip[0].px = mouseX;
    whip[0].py = mouseY;
  }

  // Prevent rubber-band stretching spikes before constraints.
  capSegmentStretch();
  applyWallCollisions();

  // Keep early whip segments posed upward from handle.
  applyBasePose();

  // Distance constraints (multiple iterations for stiffness)
  for (let iter = 0; iter < P.constraintIters; iter++) {
    for (let i = 0; i < whip.length - 1; i++) {
      const a = whip[i], b = whip[i + 1];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.0001;
      const target = segLen(i);
      const diff = (dist - target) / dist * 0.5;
      const ox = dx * diff, oy = dy * diff;
      if (i === 0 && !dropping) {
        // Handle is pinned – push only the next point
        b.x -= ox * 2;
        b.y -= oy * 2;
      } else {
        a.x += ox; a.y += oy;
        b.x -= ox; b.y -= oy;
      }
    }
    // Clamp bend angle per joint; near handle = stiffer, near tip = floppier.
    applyBendLimits();
    if (!dropping) applyBasePose();
    capSegmentStretch();
    applyWallCollisions();
  }

  // Tip velocity for crack detection
  const tip = whip[whip.length - 1];
  const tipVel = Math.hypot(tip.x - tip.px, tip.y - tip.py);

  if (!dropping && tipVel > P.crackSpeed) {
    const now = Date.now();
    if (now - whipSpawnTime >= P.firstCrackGraceMs && now - lastCrackTime > P.crackCooldownMs) {
      lastCrackTime = now;
      playCrackSound();
      window.bridge.whipCrack();
    }
  }

  // If dropping, check if everything fell off screen
  if (dropping && whip.every(p => p.y > H + 60)) {
    whip = null;
    dropping = false;
    shoutBubble = null;
    updateButton();
    updateMouseIgnore();
  }
  prevMouseX = mouseX;
  prevMouseY = mouseY;
}

// ── Rendering ───────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Near-invisible fill so the window captures mouse events on Windows
  ctx.fillStyle = `rgba(0,0,0,${P.bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  if (!whip) return;

  // White: thin halo on full spline, then extra thickness only over handle links.
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#fff';
  if (whip.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(whip[0].x, whip[0].y);
    for (let i = 0; i < whip.length - 1; i++) {
      const { cp1x, cp1y, cp2x, cp2y, x2, y2 } = whipSegmentBezier(whip, i);
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
    }
    ctx.lineWidth = P.lineWidthTip + P.outlineWidth * 2;
    ctx.stroke();

    const thickLinks = Math.min(P.handleThickSegments, whip.length - 1);
    if (thickLinks > 0 && P.handleExtraWidth > 0) {
      ctx.beginPath();
      ctx.moveTo(whip[0].x, whip[0].y);
      for (let i = 0; i < thickLinks; i++) {
        const { cp1x, cp1y, cp2x, cp2y, x2, y2 } = whipSegmentBezier(whip, i);
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
      }
      ctx.lineWidth =
        P.lineWidthHandle + P.handleExtraWidth + P.outlineWidth * 2;
      ctx.stroke();
    }
  }

  ctx.strokeStyle = '#111';
  for (let i = 0; i < whip.length - 1; i++) {
    const t = i / Math.max(1, whip.length - 2);
    const extra = i < P.handleThickSegments ? P.handleExtraWidth : 0;
    ctx.lineWidth = lerp(P.lineWidthHandle, P.lineWidthTip, t) + extra;
    const { cp1x, cp1y, cp2x, cp2y, x2, y2 } = whipSegmentBezier(whip, i);
    ctx.beginPath();
    ctx.moveTo(whip[i].x, whip[i].y);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
    ctx.stroke();
  }
}

// ── Shout bubble ─────────────────────────────────────────────────────────────
let shoutBubble = null;

// External SVG speech bubble (assets/Shout.svg, viewBox 2367×952)
const _bubbleSvgImg = new Image();
let _bubbleSvgReady = false;
_bubbleSvgImg.onload = () => { _bubbleSvgReady = true; };
_bubbleSvgImg.src = 'assets/Shout.svg';
// SVG layout constants (in viewBox units: 2367×952)
const _SVG_W = 2367, _SVG_H = 952;
const _SVG_BCX = 1183.5; // body center x (horizontal midpoint)
const _SVG_BCY = 450;    // body center y
const _SVG_IW = 1700;    // inner text area width (inside spike bases)
const _SVG_IH = 460;     // inner text area height — reduced to add top/bottom padding
// Scale factor to shrink bubble (1.0 = full size)
const BUBBLE_SCALE = 0.97;

const BUBBLE_FONTS = ['BubbleCartoon'];

function setShoutBubble(text) {
  const font = BUBBLE_FONTS[Math.floor(Math.random() * BUBBLE_FONTS.length)];
  const jitterSeed = Math.random() * 9999;
  // Reuse existing bubble — just update text and replay pop animation
  if (shoutBubble) {
    shoutBubble.text = text;
    shoutBubble.font = font;
    shoutBubble.jitterSeed = jitterSeed;
    shoutBubble.spawnTime = Date.now();
  } else {
    shoutBubble = { text, spawnTime: Date.now(), font, jitterSeed };
  }
}

function charJitter(seed, idx, maxJ) {
  const v = Math.sin(seed + idx * 127.1 + idx * idx * 0.31) * 43758.5453;
  return (v - Math.floor(v) - 0.5) * 2 * maxJ;
}

const LETTER_SPACING = 3;

function spaceWidth(text) {
  return [...text].reduce((w, ch) => w + ctx.measureText(ch).width, 0)
    + Math.max(0, text.length - 1) * LETTER_SPACING;
}

function wrapWords(text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (spaceWidth(test) > maxW && line) { lines.push(line); line = word; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}


function drawShoutBubble() {
  if (!shoutBubble || dropping) return;
  const elapsed = Date.now() - shoutBubble.spawnTime;

  // Fade in, stay visible for 6 seconds (6000ms), then fade out over 500ms
  const SHOW_DURATION = 6000;    // 6 seconds
  const FADE_OUT_DURATION = 500; // fade over 0.5 seconds
  const TOTAL_DURATION = SHOW_DURATION + FADE_OUT_DURATION;

  let alpha;
  if (elapsed < 100) {
    alpha = elapsed / 100; // fade in
  } else if (elapsed < SHOW_DURATION) {
    alpha = 1; // stay visible
  } else if (elapsed < TOTAL_DURATION) {
    alpha = 1 - (elapsed - SHOW_DURATION) / FADE_OUT_DURATION; // fade out
  } else {
    shoutBubble = null; // clear bubble after fade completes
    return;
  }

  const scale = elapsed < 80  ? lerp(0.3, 1.12, elapsed / 80)
    : elapsed < 200 ? lerp(1.12, 1.0, (elapsed - 80) / 120)
    : 1.0;

  // SVG bubble — full-size coords, scaled via canvas transform for pop animation
  const svgW = W * 0.60 * BUBBLE_SCALE;
  const svgH = svgW * (_SVG_H / _SVG_W);
  const svgX = (W - svgW) / 2;
  // Raise the bubble to halfway between screen center and the top margin.
  const svgY = (H - svgH) / 2 - H / 4;
  const svgScale = svgW / _SVG_W;
  const textCX = W / 2;
  const textCY = svgY + _SVG_BCY * svgScale;
  const maxTextW = _SVG_IW * svgScale * 0.85;
  const maxTextH = _SVG_IH * svgScale * 0.85;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(textCX, textCY);
  ctx.scale(scale, scale);
  ctx.translate(-textCX, -textCY);

  if (_bubbleSvgReady) ctx.drawImage(_bubbleSvgImg, svgX, svgY, svgW, svgH);

  // Text — start at 30px, shrink to fit inner bubble area
  let fs = 30;
  let lines;
  while (fs >= 8) {
    ctx.font = `bold ${fs}px '${shoutBubble.font}', Impact, 'Arial Black', sans-serif`;
    lines = wrapWords(shoutBubble.text, maxTextW);
    if (lines.length * fs * 1.25 <= maxTextH) break;
    fs -= 1;
  }
  ctx.font = `bold ${fs}px '${shoutBubble.font}', Impact, 'Arial Black', sans-serif`;
  const lh = fs * 1.25;
  const maxJitter = 1.5;
  const startY = textCY - (lines.length - 1) * lh / 2;
  ctx.fillStyle = '#111';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  let charIdx = 0;
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const lineW = spaceWidth(line);
    let x = textCX - lineW / 2;
    const lineY = startY + li * lh;
    for (let ci = 0; ci < line.length; ci++) {
      const ch = line[ci];
      const jy = charJitter(shoutBubble.jitterSeed, charIdx++, maxJitter);
      ctx.fillText(ch, x, lineY + jy);
      x += ctx.measureText(ch).width + (ci < line.length - 1 ? LETTER_SPACING : 0);
    }
  }

  ctx.restore();
}

// ── Main loop ───────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  drawShoutBubble();
  requestAnimationFrame(loop);
}
loop();

// ── Stats HUD & button ───────────────────────────────────────────────────────
const statsEl     = document.getElementById('stats');
const grabBtn     = document.getElementById('grab-btn');
const volSlider   = document.getElementById('vol-slider');
const closeBtn    = document.getElementById('stats-close');

// Scoreboard scale (drag-to-resize). Persisted so it survives reloads.
const SCALE_KEY = 'openwhip-stats-scale';
const MIN_SCALE = 0.5, MAX_SCALE = 3;
let statsScale = parseFloat(localStorage.getItem(SCALE_KEY)) || 0.93;
let resizing = null; // 'r' | 'b' | 'br' while dragging a handle, else null

function applyStatsScale() { statsEl.style.transform = `scale(${statsScale})`; }

// ── Flip-card counter (adapted from FlipDown by Peter Butcher) ────────────────
class FlipCounter {
  constructor(el) {
    this.el = el;
    this.rotors = [];       // left → right, one per digit
    this.set(0, true);      // initial value, no animation
  }

  _makeRotor(digit) {
    const rotor = document.createElement('div');
    rotor.className = 'rotor';
    rotor.innerHTML =
      '<div class="rotor-leaf">' +
        '<figure class="rotor-leaf-rear">'  + digit + '</figure>' +
        '<figure class="rotor-leaf-front">' + digit + '</figure>' +
      '</div>' +
      '<div class="rotor-top">'    + digit + '</div>' +
      '<div class="rotor-bottom">' + digit + '</div>';
    rotor._value = digit;
    rotor._flipping = false;
    rotor._pending = null;
    return rotor;
  }

  set(value, instant = false) {
    const str = String(Math.max(0, Math.floor(value)));

    // Grow/shrink rotor count, keeping digits right-aligned (odometer style).
    while (this.rotors.length < str.length) {
      const r = this._makeRotor('0');
      this.rotors.unshift(r);
      this.el.insertBefore(r, this.el.firstChild);
    }
    while (this.rotors.length > str.length) {
      this.el.removeChild(this.rotors.shift());
    }

    for (let i = 0; i < str.length; i++) {
      this._setDigit(this.rotors[i], str[i], instant);
    }
  }

  _setDigit(rotor, digit, instant) {
    if (rotor._value === digit && !rotor._flipping) return;
    if (instant) {
      rotor._value = digit;
      rotor._pending = null;
      rotor.querySelector('.rotor-leaf-front').textContent = digit;
      rotor.querySelector('.rotor-leaf-rear').textContent  = digit;
      rotor.querySelector('.rotor-top').textContent        = digit;
      rotor.querySelector('.rotor-bottom').textContent     = digit;
      return;
    }
    if (rotor._flipping) { rotor._pending = digit; return; }  // queue latest
    if (rotor._value === digit) return;
    this._flip(rotor, digit);
  }

  _flip(rotor, digit) {
    rotor._flipping = true;
    const leaf   = rotor.querySelector('.rotor-leaf');
    const front  = rotor.querySelector('.rotor-leaf-front');
    const rear   = rotor.querySelector('.rotor-leaf-rear');
    const top    = rotor.querySelector('.rotor-top');
    const bottom = rotor.querySelector('.rotor-bottom');

    // Reveal new value on the hidden faces, then drop the leaf.
    top.textContent  = digit;
    rear.textContent = digit;
    leaf.classList.add('flipped');

    setTimeout(() => {
      // Restore idle state showing the new value, then snap leaf back (0s).
      front.textContent  = digit;
      bottom.textContent = digit;
      leaf.classList.remove('flipped');
      rotor._value = digit;
      rotor._flipping = false;
      if (rotor._pending !== null) {
        const next = rotor._pending;
        rotor._pending = null;
        this._setDigit(rotor, next, false);
      }
    }, 500);
  }
}

const sessionCounter = new FlipCounter(document.getElementById('stat-session'));
const totalCounter   = new FlipCounter(document.getElementById('stat-total'));
let _countsInitialised = false;

// Splay each label's letters into evenly-spaced columns so "SESSION" and
// "ALLTIME" (both 7 glyphs) fill the same width and line up letter-for-letter.
document.querySelectorAll('.stat-label').forEach(el => {
  const text = el.textContent.replace(/\s+/g, '');
  el.textContent = '';
  for (const ch of text) {
    const s = document.createElement('span');
    s.textContent = ch;
    el.appendChild(s);
  }
});

function updateButton() {
  grabBtn.textContent = (whip && !dropping) ? 'Drop Whip' : 'Grab Whip';
}

function updateMouseIgnore() {
  if (resizing) {
    // Keep capturing the mouse for the whole drag, even outside the panel.
    window.bridge.setIgnoreMouseEvents(false, {});
    return;
  }
  if (whip && !dropping) {
    window.bridge.setIgnoreMouseEvents(false, {});
    return;
  }
  const r = statsEl.getBoundingClientRect();
  const over = mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom;
  window.bridge.setIgnoreMouseEvents(!over, { forward: true });
}

grabBtn.addEventListener('click', () => {
  if (whip && !dropping) {
    dropping = true;
    shoutBubble = null;
    updateButton();
  } else if (!whip) {
    shoutBubble = null;
    mouseX = W / 2;
    mouseY = H * 0.55;
    whip = spawnWhip(mouseX, mouseY);
    dropping = false;
    prevMouseX = mouseX;
    prevMouseY = mouseY;
    handleAngle = P.baseTargetAngle;
    handleAngVel = 0;
    updateButton();
    updateMouseIgnore();
  }
});

window.bridge.onCountUpdate(({ session, total }) => {
  const instant = !_countsInitialised;
  sessionCounter.set(session, instant);
  totalCounter.set(total, instant);
  _countsInitialised = true;
});

// ── IPC from main process ───────────────────────────────────────────────────
window.bridge.onDropWhip(() => {
  whip = null;
  dropping = false;
  shoutBubble = null;
  updateButton();
  updateMouseIgnore();
});

window.bridge.onLastPhrase(phrase => setShoutBubble(phrase));
window.bridge.onVolumeUpdate(({ volume, muted }) => {
  _volume = volume;
  _muted = muted;
  volSlider.value = Math.round(volume * 100);
  updateSliderFill();
});

function updateSliderFill() {
  const pct = volSlider.value + '%';
  volSlider.style.background =
    `linear-gradient(to right, rgba(245,196,0,0.85) 0%, rgba(245,196,0,0.85) ${pct}, rgba(255,255,255,0.15) ${pct}, rgba(255,255,255,0.15) 100%)`;
}

volSlider.addEventListener('input', () => {
  const v = volSlider.value / 100;
  _volume = v;
  updateSliderFill();
  window.bridge.setVolume(v);
});

// ── Close button ─────────────────────────────────────────────────────────────
closeBtn.addEventListener('click', () => {
  // Hide the whole overlay; the tray icon brings it back.
  whip = null;
  dropping = false;
  shoutBubble = null;
  window.bridge.hideOverlay();
});

// ── Drag-to-resize (uniform scale, anchored at the panel's top-left) ──────────
function onResizeMove(e) {
  if (!resizing) return;
  const r = statsEl.getBoundingClientRect();        // visual box (origin pinned)
  const nW = statsEl.offsetWidth || 1;              // unscaled layout size
  const nH = statsEl.offsetHeight || 1;
  const sx = (e.clientX - r.left) / nW;
  const sy = (e.clientY - r.top)  / nH;
  let s = resizing === 'r' ? sx
        : resizing === 'b' ? sy
        : Math.max(sx, sy);                          // corner: follow the further axis
  statsScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, s));
  applyStatsScale();
}

function onResizeEnd() {
  resizing = null;
  document.removeEventListener('mousemove', onResizeMove);
  document.removeEventListener('mouseup', onResizeEnd);
  localStorage.setItem(SCALE_KEY, String(statsScale));
  updateMouseIgnore();
}

document.querySelectorAll('.resize-handle').forEach(h => {
  h.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    resizing = h.dataset.dir;
    window.bridge.setIgnoreMouseEvents(false, {});
    document.addEventListener('mousemove', onResizeMove);
    document.addEventListener('mouseup', onResizeEnd);
  });
});

// Show stats panel immediately and enable mouse pass-through on load
applyStatsScale();
statsEl.classList.add('visible');
updateSliderFill();
window.bridge.setIgnoreMouseEvents(true, { forward: true });

</script>
</body>
